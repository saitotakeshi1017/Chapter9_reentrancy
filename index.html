<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Contract Security — Focused Quiz</title>
<style>
  /* Memory-friendly palette: warm cream + sage + muted teal.
     Avoids glaring white, pure black, and bright red — easier on
     the eyes during long study sessions and reduces test-anxiety
     coloring on wrong answers. */
  :root {
    --bg:        #F5EFE0;
    --bg-soft:   #EDE4D0;
    --card:      #FBF7EC;
    --ink:       #2E3A3A;
    --muted:     #6B7775;
    --accent:    #5B8A8A;
    --accent-d:  #406A6A;
    --good:      #7BA77B;
    --good-bg:   #DFEBDC;
    --bad:       #B8746B;
    --bad-bg:    #EFD9D3;
    --hi:        #E8C97A;
    --line:      #d8cfba;
    --shadow:    0 2px 0 rgba(46,58,58,0.08), 0 6px 18px rgba(46,58,58,0.06);
    --radius:    14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 14px 60px;
  }
  .wrap { width: 100%; max-width: 760px; }

  header { text-align: center; margin-bottom: 18px; }
  header h1 {
    font-size: 1.45rem; margin: 0 0 4px;
    color: var(--accent-d); letter-spacing: 0.3px;
  }
  header p { margin: 0; color: var(--muted); font-size: 0.9rem; }

  .bar {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: space-between; align-items: center;
    background: var(--bg-soft); padding: 9px 13px;
    border-radius: var(--radius); font-size: 0.88rem;
    color: var(--muted); margin-bottom: 12px;
  }
  .bar strong { color: var(--ink); font-weight: 600; }
  .bar .pill {
    background: var(--card); padding: 3px 10px;
    border-radius: 999px; border: 1px solid var(--line);
  }

  .progress-track {
    width: 100%; height: 6px; background: var(--bg-soft);
    border-radius: 999px; overflow: hidden; margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    width: 0%; transition: width .3s ease;
  }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 24px 22px 20px; box-shadow: var(--shadow);
  }

  .qnum {
    font-size: 0.75rem; letter-spacing: 1.2px;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 6px; font-weight: 600;
  }
  .qtype-tag {
    display: inline-block; margin-left: 8px;
    padding: 2px 8px; border-radius: 999px;
    background: var(--hi); color: #6b4f1a;
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .qtext {
    font-size: 1.08rem; margin: 4px 0 16px; color: var(--ink);
  }
  .qtext code, .feedback code, .review-item code {
    background: var(--hi); padding: 1px 6px; border-radius: 4px;
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 0.92em;
  }

  /* ---- MC options ---- */
  .options { display: grid; gap: 9px; }
  .opt {
    text-align: left; background: #FFFDF6;
    border: 1.5px solid var(--line); color: var(--ink);
    padding: 11px 13px; border-radius: 10px;
    font-size: 0.96rem; cursor: pointer;
    transition: all .15s ease; font-family: inherit;
    line-height: 1.45; width: 100%;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent); background: #FFFEFA;
    transform: translateY(-1px);
  }
  .opt:disabled { cursor: default; }
  .opt.correct, .opt.reveal {
    background: var(--good-bg); border-color: var(--good); color: #2f4a2f;
  }
  .opt.wrong {
    background: var(--bad-bg); border-color: var(--bad); color: #5a2c26;
  }
  .opt .marker {
    display: inline-block; width: 22px; height: 22px; line-height: 22px;
    border-radius: 50%; background: var(--bg-soft); color: var(--muted);
    text-align: center; font-size: 0.78rem; margin-right: 10px; font-weight: 700;
  }
  .opt.correct .marker, .opt.reveal .marker { background: var(--good); color: white; }
  .opt.wrong .marker { background: var(--bad); color: white; }

  /* ---- Drag-drop common ---- */
  .dd-hint {
    font-size: 0.85rem; color: var(--accent-d);
    margin-bottom: 14px; padding: 8px 12px;
    background: rgba(91, 138, 138, 0.08);
    border-radius: 8px; border-left: 3px solid var(--accent);
  }

  .dd-card {
    background: var(--card);
    border: 1.5px solid var(--accent);
    color: var(--accent-d);
    padding: 7px 12px; border-radius: 8px;
    font-size: 0.9rem; cursor: pointer;
    font-weight: 500; user-select: none;
    transition: all 0.15s ease; font-family: inherit;
    line-height: 1.4; text-align: left;
  }
  .dd-card:hover:not(:disabled) { background: #fff; }
  .dd-card.selected {
    background: var(--accent); color: white;
    transform: scale(1.04);
    box-shadow: 0 0 0 3px rgba(91, 138, 138, 0.25);
  }
  .dd-card.correct {
    background: var(--good-bg); border-color: var(--good);
    color: #2f4a2f; cursor: default;
  }
  .dd-card.wrong {
    background: var(--bad-bg); border-color: var(--bad);
    color: #5a2c26; cursor: default;
  }
  .dd-card[disabled] { cursor: default; }

  .slot-target {
    border: 2px dashed var(--line); border-radius: 8px;
    background: var(--bg-soft); padding: 5px;
    min-height: 44px; display: flex; align-items: center;
    justify-content: center; cursor: pointer;
    transition: border-color .15s ease;
  }
  .slot-target:hover { border-color: var(--accent); }
  .slot-target.has-card { border-style: solid; background: #fbf3df; padding: 4px; }
  .slot-target.correct {
    border-color: var(--good); background: var(--good-bg);
    border-style: solid;
  }
  .slot-target.wrong {
    border-color: var(--bad); background: var(--bad-bg);
    border-style: solid;
  }
  .slot-target .placeholder {
    color: var(--muted); font-size: 0.82rem;
  }
  .slot-target .dd-card { width: 100%; }

  /* ---- Match layout ---- */
  .match-list { display: flex; flex-direction: column; gap: 8px; }
  .match-row {
    display: flex; align-items: center; gap: 10px;
  }
  .match-label {
    flex: 1; font-size: 0.9rem; color: var(--ink);
  }
  .match-label code {
    font-size: 0.88em;
  }
  .match-row .slot-target { width: 170px; flex: none; }
  .slot-hint {
    font-size: 0.75rem; color: var(--good);
    margin-top: 3px; font-style: italic;
  }
  @media (max-width: 520px) {
    .match-row { flex-direction: column; align-items: stretch; gap: 4px; }
    .match-row .slot-target { width: 100%; }
  }

  /* ---- Order layout ---- */
  .order-list { display: flex; flex-direction: column; gap: 8px; }
  .order-row {
    display: flex; align-items: stretch; gap: 10px;
  }
  .order-num {
    width: 34px; min-height: 44px;
    border-radius: 8px; background: var(--accent);
    color: white; display: flex; align-items: center;
    justify-content: center; font-weight: 700; flex-shrink: 0;
    font-size: 1rem;
  }
  .order-row .slot-target { flex: 1; }

  /* ---- Categorize layout ---- */
  .cat-zones {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 12px;
  }
  .cat-zone {
    border: 2px dashed var(--line); border-radius: 12px;
    padding: 12px; min-height: 130px;
    background: var(--bg-soft); cursor: pointer;
    transition: border-color .15s ease;
  }
  .cat-zone:hover { border-color: var(--accent); }
  .cat-zone-label {
    font-weight: 600; font-size: 0.88rem;
    color: var(--accent-d); margin-bottom: 8px;
    text-align: center;
  }
  .cat-zone-cards {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  }
  @media (max-width: 480px) {
    .cat-zones { grid-template-columns: 1fr; }
  }

  /* ---- Card bank ---- */
  .card-bank {
    margin-top: 14px; padding: 11px 12px;
    background: var(--bg-soft); border-radius: 10px;
    border: 1px solid var(--line);
  }
  .card-bank-label {
    font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px; font-weight: 600;
  }
  .card-bank-cards {
    display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px;
  }
  .card-bank-cards .empty-hint {
    color: var(--good); font-size: 0.85rem; font-style: italic;
  }

  /* ---- Feedback & actions ---- */
  .feedback {
    margin-top: 14px; padding: 11px 13px;
    border-radius: 10px; font-size: 0.92rem;
    display: none; line-height: 1.5;
  }
  .feedback.good { background: var(--good-bg); color: #2f4a2f; display: block; }
  .feedback.bad  { background: var(--bad-bg); color: #5a2c26; display: block; }
  .feedback b { font-weight: 700; }

  .actions {
    display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
  }
  button.btn {
    background: var(--accent); color: #FBF7EC;
    border: none; padding: 11px 22px; border-radius: 10px;
    font-size: 0.96rem; font-weight: 600; cursor: pointer;
    font-family: inherit;
    transition: background .15s ease, transform .1s ease;
  }
  button.btn:hover { background: var(--accent-d); }
  button.btn:active { transform: translateY(1px); }
  button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
  button.btn.ghost {
    background: transparent; color: var(--accent-d);
    border: 1.5px solid var(--accent);
  }
  button.btn.ghost:hover { background: var(--bg-soft); }

  /* ---- Result ---- */
  .result { text-align: center; padding: 12px 6px 6px; }
  .result h2 {
    margin: 0 0 6px; color: var(--accent-d); font-size: 1.5rem;
  }
  .score-big {
    font-size: 2.6rem; font-weight: 700;
    color: var(--ink); margin: 12px 0 4px;
  }
  .score-pct { color: var(--muted); font-size: 1rem; }
  .badge {
    display: inline-block; margin: 12px auto 4px;
    padding: 6px 14px; border-radius: 999px;
    font-size: 0.88rem; font-weight: 600;
  }
  .badge.gold   { background: #F5E4B7; color: #6B4F1A; }
  .badge.silver { background: #E5E2D9; color: #4A4A4A; }
  .badge.bronze { background: #EBD7C4; color: #6B3F1A; }
  .badge.try    { background: var(--bg-soft); color: var(--muted); }

  .review-list {
    text-align: left; margin: 16px 0 6px;
    max-height: 260px; overflow-y: auto;
    border-top: 1px dashed var(--line); padding-top: 12px;
  }
  .review-list h3 {
    margin: 0 0 10px; font-size: 0.9rem;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }
  .review-item {
    background: var(--bg-soft); border-left: 3px solid var(--bad);
    padding: 9px 11px; border-radius: 8px;
    margin-bottom: 7px; font-size: 0.88rem;
  }
  .review-item .qq { font-weight: 600; margin-bottom: 3px; }
  .review-item .info { color: var(--muted); font-size: 0.82rem; }

  footer {
    text-align: center; color: var(--muted);
    font-size: 0.78rem; margin-top: 20px;
  }

  @media (max-width: 480px) {
    .qtext { font-size: 1rem; }
    header h1 { font-size: 1.25rem; }
    .score-big { font-size: 2.2rem; }
    .card { padding: 20px 16px 18px; }
  }


  /* ---- Question map + reveal/reset additions ---- */
  .question-map {
    display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: center; margin: 0 0 14px;
    background: var(--bg-soft); padding: 9px;
    border-radius: var(--radius);
  }
  .qjump {
    min-width: 34px; height: 34px; padding: 0 9px;
    border-radius: 999px; border: 1.5px solid var(--line);
    background: var(--card); color: var(--muted);
    font-family: inherit; font-weight: 700; cursor: pointer;
    transition: all .15s ease;
  }
  .qjump:hover { border-color: var(--accent); color: var(--accent-d); transform: translateY(-1px); }
  .qjump.active { background: var(--accent); color: #FBF7EC; border-color: var(--accent); }
  .qjump.correct { background: var(--good-bg); color: #2f4a2f; border-color: var(--good); }
  .qjump.wrong { background: var(--bad-bg); color: #5a2c26; border-color: var(--bad); }
  .qjump.revealed { background: #F5E4B7; color: #6B4F1A; border-color: var(--hi); }
  .qjump.active.correct, .qjump.active.wrong, .qjump.active.revealed {
    box-shadow: 0 0 0 3px rgba(91, 138, 138, 0.25);
  }
  .actions .spacer { flex: 1 1 auto; }
  @media (max-width: 480px) {
    .actions { gap: 8px; }
    button.btn { padding: 10px 13px; font-size: 0.9rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Smart Contract Security</h1>
    <p>15 focused questions · jump map · reveal/reset · replay to lock in 🌿</p>
  </header>

  <div class="bar">
    <span>Round <strong id="round">1</strong></span>
    <span class="pill">Q <strong id="qIdx">1</strong> / <strong id="qTotal">12</strong></span>
    <span>Score <strong id="score">0</strong></span>
    <span>Best <strong id="best">—</strong></span>
    <span>Completed <strong id="completed">0</strong></span>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
  <div class="question-map" id="qMap" aria-label="Question map"></div>

  <div class="card" id="card"></div>

  <footer>Smart Contract Security · Reentrancy · Delegatecall · Entropy Illusion</footer>
</div>


<script>
const BANK = [
  {
    "type": "mc",
    "q": "Why is a reentrancy attack possible in Ethereum smart contracts?",
    "choices": [
      "A contract makes an external call before its own state is safely updated.",
      "A contract uses a mapping, so every depositor shares one stored balance.",
      "A contract compiles with Remix, so the VM automatically exposes funds.",
      "A contract receives ether, so Solidity erases all withdrawal conditions."
    ],
    "answer": 0,
    "note": "Reentrancy appears when execution leaves the victim contract through an <b>external call</b> before the victim has completed critical state updates."
  },
  {
    "type": "order",
    "q": "Put the classic <b>EtherStore reentrancy exploit</b> in the correct order.",
    "items": [
      "The attacker deploys a malicious contract linked to the EtherStore address.",
      "The attacker deposits 1 ether so the store records a withdrawable balance.",
      "The attacker calls withdrawFunds, causing EtherStore to send ether outward.",
      "The attacker contract's receive function runs and calls withdrawFunds again.",
      "The same stale balance is reused because accounting has not been updated yet.",
      "The loop repeats until the store no longer has enough ether to keep paying."
    ],
    "note": "The core loop is: deposit -> withdraw -> external send -> receive callback -> reenter before state update."
  },
  {
    "type": "match",
    "q": "Match each <b>contract element</b> to its role in the reentrancy example.",
    "pairs": [
      {
        "card": "depositFunds",
        "slot": "Adds msg.value to the sender's recorded balance"
      },
      {
        "card": "withdrawFunds",
        "slot": "Sends ether outward and then updates accounting too late"
      },
      {
        "card": "receive",
        "slot": "Runs automatically when the attacker contract receives ether"
      },
      {
        "card": "collectEther",
        "slot": "Moves stolen ether from the attacker contract to the attacker's EOA"
      },
      {
        "card": "balances mapping",
        "slot": "Tracks how much each account or contract can withdraw"
      },
      {
        "card": "lastWithdrawTime",
        "slot": "Stores when an address last withdrew funds"
      }
    ],
    "note": "These roles combine the textbook example with Rose John's Remix walkthrough."
  },
  {
    "type": "mc",
    "q": "In the vulnerable withdraw function, which pattern is most dangerous?",
    "choices": [
      "It checks the withdrawal limit, sends ether externally, then subtracts the balance.",
      "It subtracts the balance, updates the timestamp, then sends ether externally.",
      "It rejects excessive requests, updates accounting, then emits a success event.",
      "It records the timestamp, reduces the balance, then calls the receiver last."
    ],
    "answer": 0,
    "note": "The dangerous pattern is <b>interaction before effects</b>: the external send happens before the balance and timestamp are updated."
  },
  {
    "type": "mc",
    "q": "Which code sketch best follows the <b>checks-effects-interactions</b> pattern?",
    "choices": [
      "<code>require(ok); amount = balances[msg.sender]; call(value); balances[msg.sender] -= amount;</code>",
      "<code>require(balanceOK); balances[msg.sender] -= amount; last[msg.sender] = now; call(value);</code>",
      "<code>call(value); require(success); amount = balances[msg.sender]; last[msg.sender] = now;</code>",
      "<code>amount = limit; call(value); require(success); balances[msg.sender] -= amount;</code>"
    ],
    "answer": 1,
    "note": "CEI means check conditions first, update internal state second, and interact with external addresses last."
  },
  {
    "type": "categorize",
    "q": "Sort each item into <b>vulnerability type</b> or <b>defense / safer practice</b>.",
    "categories": [
      "Vulnerability type",
      "Defense / safer practice"
    ],
    "items": [
      {
        "text": "classic reentrancy",
        "category": "Vulnerability type"
      },
      {
        "text": "cross-function reentry",
        "category": "Vulnerability type"
      },
      {
        "text": "read-only reentry",
        "category": "Vulnerability type"
      },
      {
        "text": "checks-effects-interactions",
        "category": "Defense / safer practice"
      },
      {
        "text": "ReentrancyGuard",
        "category": "Defense / safer practice"
      },
      {
        "text": "stateless library design",
        "category": "Defense / safer practice"
      }
    ],
    "note": "The left side names attack patterns; the right side names ways to reduce exposure."
  },
  {
    "type": "mc",
    "q": "What makes <b>cross-function reentry</b> different from the simplest reentrancy pattern?",
    "choices": [
      "The attacker reenters a related function instead of returning through the exact same one.",
      "The attacker must mine a new block before the first function finishes execution.",
      "The attacker avoids external calls and changes storage directly from an EOA.",
      "The attacker relies only on block timestamps instead of contract callbacks."
    ],
    "answer": 0,
    "note": "Rose's explanation focused on vulnerability spread across functions: control leaves before state is settled, then another function is used to exploit the gap."
  },
  {
    "type": "order",
    "q": "Put Rose John's <b>Remix demonstration flow</b> in the correct order.",
    "items": [
      "Compile and deploy the EtherStore contract first.",
      "Fund EtherStore so there is something worth exploiting.",
      "Copy the EtherStore address for the attacker constructor.",
      "Compile and deploy the attacker contract with the store address.",
      "Send the required ether value while calling the attack function.",
      "Call collectEther to move the drained funds to the attacker's EOA."
    ],
    "note": "In the demo, the store is deployed and funded before the attacker is deployed and triggered."
  },
  {
    "type": "match",
    "q": "Match each <b>Remix / Solidity detail</b> to what it means in the attack demo.",
    "pairs": [
      {
        "card": "red button",
        "slot": "A payable function that can receive ether with the call"
      },
      {
        "card": "orange button",
        "slot": "A state-changing function that is not payable"
      },
      {
        "card": "view method",
        "slot": "A generated or written reader that does not change state"
      },
      {
        "card": "constructor parameter",
        "slot": "The store address supplied when deploying the attacker"
      },
      {
        "card": "EOA",
        "slot": "A user-controlled account rather than a contract"
      },
      {
        "card": "VM account list",
        "slot": "The test accounts and balances used in Remix"
      }
    ],
    "note": "Rose emphasized that the Remix UI is part of the mechanics: contract instances, EOAs, payable calls, and balances must all be managed."
  },
  {
    "type": "mc",
    "q": "Why can <b>read-only reentrancy</b> still matter if a view function does not change state?",
    "choices": [
      "Another contract may read temporarily inconsistent data and make a harmful decision from it.",
      "A view function secretly writes to storage whenever it is called by an attacker contract.",
      "The EVM gives view functions unlimited gas, so they can always bypass all checks.",
      "A view function can delete the caller's code even when no transaction is sent."
    ],
    "answer": 0,
    "note": "Read-only reentrancy is dangerous because external systems may trust data read while another contract is in an inconsistent intermediate state."
  },
  {
    "type": "mc",
    "q": "What is the key difference between <b>CALL</b> and <b>DELEGATECALL</b>?",
    "choices": [
      "CALL runs in the callee's context; DELEGATECALL runs borrowed code in the caller's context.",
      "CALL preserves msg.sender and storage; DELEGATECALL always resets them to zero.",
      "CALL works only for libraries; DELEGATECALL works only for externally owned accounts.",
      "CALL changes storage slots by name; DELEGATECALL changes only local variables."
    ],
    "answer": 0,
    "note": "DELEGATECALL borrows another contract's bytecode but keeps the caller's storage, msg.sender, and msg.value context."
  },
  {
    "type": "match",
    "q": "Match each <b>delegatecall storage idea</b> to the correct explanation.",
    "pairs": [
      {
        "card": "slot[0] in FibonacciLib",
        "slot": "The library's start variable"
      },
      {
        "card": "slot[1] in FibonacciLib",
        "slot": "The library's calculatedFibNumber variable"
      },
      {
        "card": "slot[0] in FibonacciBalance",
        "slot": "The calling contract's fibonacciLibrary address"
      },
      {
        "card": "slot[1] in FibonacciBalance",
        "slot": "The calling contract's calculatedFibNumber variable"
      },
      {
        "card": "setStart through fallback",
        "slot": "Can overwrite the library address in the caller's storage"
      },
      {
        "card": "stateless library",
        "slot": "Reduces context-preservation risks from shared storage layout"
      }
    ],
    "note": "With delegatecall, storage slot positions matter more than variable names."
  },
  {
    "type": "mc",
    "q": "What is the <b>Entropy Illusion</b> in Ethereum smart contracts?",
    "choices": [
      "Treating deterministic block data as if it were secure randomness.",
      "Assuming every validator must publish a private key before proposing a block.",
      "Believing gas prices randomly change the bytecode that a contract executes.",
      "Using a mapping to store balances because storage slots are unpredictable."
    ],
    "answer": 0,
    "note": "Ethereum execution is deterministic. Block values may look random, but they are not secure randomness for games or lotteries."
  },
  {
    "type": "categorize",
    "q": "Sort each randomness source into <b>unsafe shortcut</b> or <b>safer randomness approach</b>.",
    "categories": [
      "Unsafe shortcut",
      "Safer randomness approach"
    ],
    "items": [
      {
        "text": "block.timestamp as a seed",
        "category": "Unsafe shortcut"
      },
      {
        "text": "block hash parity game",
        "category": "Unsafe shortcut"
      },
      {
        "text": "block number as lottery randomness",
        "category": "Unsafe shortcut"
      },
      {
        "text": "Chainlink VRF",
        "category": "Safer randomness approach"
      },
      {
        "text": "PREVRANDAO on supported chains",
        "category": "Safer randomness approach"
      },
      {
        "text": "verifiable random function proof",
        "category": "Safer randomness approach"
      }
    ],
    "note": "The textbook warns against block-variable pseudo-randomness and points to VRFs and PREVRANDAO as more reliable approaches."
  },
  {
    "type": "order",
    "q": "Order the safer <b>withdrawFunds</b> structure using checks-effects-interactions.",
    "items": [
      "Read the caller's stored balance and compute the allowed withdrawal amount.",
      "Require that timing and balance conditions are satisfied.",
      "Subtract the withdrawal amount from the caller's balance.",
      "Update the caller's last withdrawal time.",
      "Perform the external ether transfer after internal accounting is already settled.",
      "Require or otherwise handle transfer failure without leaving inconsistent state."
    ],
    "note": "This sequence forces accounting to settle before the contract gives control to an external address."
  }
];

const elCard      = document.getElementById('card');
const elQIdx      = document.getElementById('qIdx');
const elQTotal    = document.getElementById('qTotal');
const elScore     = document.getElementById('score');
const elRound     = document.getElementById('round');
const elBest      = document.getElementById('best');
const elCompleted = document.getElementById('completed');
const elProg      = document.getElementById('progress');
const elQMap      = document.getElementById('qMap');

const STORAGE_PREFIX = 'scsec_template_v2_';
let order = [], pos = 0, score = 0, round = 1;
let wrongLog = [];
let qStates = [];
let currentDD = null;
let resultCounted = false;

elQTotal.textContent = BANK.length;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function stripTags(s) { return String(s).replace(/<[^>]+>/g, ''); }
const memStore = {};
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return memStore[k] || null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e) { memStore[k] = v; } }
function lsDel(k)    { try { localStorage.removeItem(k); } catch(e) {} delete memStore[k]; }

function startRound() {
  order = shuffle(BANK.map((_, i) => i));
  pos = 0; score = 0; wrongLog = []; resultCounted = false;
  qStates = order.map((bankIdx) => ({
    bankIdx, choiceOrder: null, dd: null, selectedCard: null, placements: {},
    answered: false, revealed: false, correct: false, scored: false, selectedChoiceOrig: null
  }));
  elScore.textContent = '0';
  elRound.textContent = round;
  elBest.textContent = lsGet(STORAGE_PREFIX + 'best') || '—';
  elCompleted.textContent = lsGet(STORAGE_PREFIX + 'completed') || '0';
  renderQuestionMap();
  renderQuestion();
}

function renderQuestionMap() {
  elQMap.innerHTML = qStates.map((st, i) => {
    let cls = 'qjump';
    if (i === pos) cls += ' active';
    if (st.revealed) cls += ' revealed';
    else if (st.answered && st.correct) cls += ' correct';
    else if (st.answered && !st.correct) cls += ' wrong';
    return `<button class="${cls}" data-jump="${i}" aria-label="Go to question ${i + 1}">${i + 1}</button>`;
  }).join('');
  elQMap.querySelectorAll('[data-jump]').forEach(btn => {
    btn.onclick = () => { pos = parseInt(btn.dataset.jump, 10); renderQuestion(); };
  });
}

function renderQuestion() {
  if (pos >= order.length) return renderResult();
  const st = qStates[pos];
  const item = BANK[st.bankIdx];
  currentDD = null;
  elQIdx.textContent = pos + 1;
  elProg.style.width = (pos / order.length * 100) + '%';
  renderQuestionMap();
  const tagMap = { mc:'Multiple choice', match:'Drag & match', order:'Drag & order', categorize:'Drag & sort' };
  let html = `<div class="qnum">Question ${pos + 1} of ${order.length}<span class="qtype-tag">${tagMap[item.type]}</span></div>`;
  html += `<p class="qtext">${item.q}</p>`;
  html += (item.type === 'mc') ? renderMC_HTML(item, st) : renderDD_HTML(item, st);
  html += `<div class="feedback" id="fb"></div>`;
  html += `<div class="actions" id="acts"></div>`;
  elCard.innerHTML = html;
  if (item.type === 'mc') attachMC(item, st); else attachDD(item, st);
  renderFeedbackIfNeeded(item, st);
  renderActions(item, st);
}

function markCorrect(st) { if (!st.scored) { score++; st.scored = true; elScore.textContent = score; } }
function unscoreIfNeeded(st) { if (st.scored) { score = Math.max(0, score - 1); st.scored = false; elScore.textContent = score; } }
function logWrongOnce(item, info) { const q = stripTags(item.q); if (!wrongLog.some(w => w.q === q)) wrongLog.push({ q, info }); }
function renderFeedbackIfNeeded(item, st) {
  const fb = document.getElementById('fb'); if (!fb) return;
  if (st.revealed) { fb.className = 'feedback good'; fb.innerHTML = `<b>Answer revealed. 🌿</b> ${item.note}`; }
  else if (st.answered) { fb.className = 'feedback ' + (st.correct ? 'good' : 'bad'); fb.innerHTML = `<b>${st.correct ? 'Correct! 🌸' : 'Not quite.'}</b> ${item.note}`; }
  else { fb.className = 'feedback'; fb.innerHTML = ''; }
}

function renderMC_HTML(item, st) {
  if (!st.choiceOrder) st.choiceOrder = shuffle(item.choices.map((_, i) => i));
  let h = '<div class="options" id="opts">';
  st.choiceOrder.forEach((origIdx, i) => {
    let cls = 'opt';
    const disabled = st.answered || st.revealed ? ' disabled' : '';
    if (st.revealed && origIdx === item.answer) cls += ' reveal';
    if (st.answered && st.selectedChoiceOrig === origIdx) cls += (st.correct ? ' correct' : ' wrong');
    if (st.answered && !st.correct && origIdx === item.answer) cls += ' reveal';
    h += `<button class="${cls}" data-i="${i}"${disabled}><span class="marker">${String.fromCharCode(65 + i)}</span>${item.choices[origIdx]}</button>`;
  });
  h += '</div>';
  return h;
}
function attachMC(item, st) {
  document.querySelectorAll('.opt').forEach(btn => {
    btn.onclick = () => {
      if (st.answered || st.revealed) return;
      const i = parseInt(btn.dataset.i, 10);
      const origIdx = st.choiceOrder[i];
      const isCorrect = origIdx === item.answer;
      st.answered = true; st.correct = isCorrect; st.selectedChoiceOrig = origIdx;
      if (isCorrect) markCorrect(st); else logWrongOnce(item, '✓ ' + stripTags(item.choices[item.answer]));
      renderQuestion();
    };
  });
}

function setupDD(item) {
  let cards, slots, slotOrder;
  if (item.type === 'match') {
    cards = item.pairs.map((p, i) => ({ id: 'c' + i, text: p.card, correctSlot: 's' + i }));
    slots = item.pairs.map((p, i) => ({ id: 's' + i, label: p.slot, multi: false }));
    slotOrder = shuffle(slots.map(s => s.id));
  } else if (item.type === 'order') {
    cards = item.items.map((t, i) => ({ id: 'c' + i, text: t, correctSlot: 's' + i }));
    slots = item.items.map((_, i) => ({ id: 's' + i, label: String(i + 1), multi: false }));
    slotOrder = slots.map(s => s.id);
  } else if (item.type === 'categorize') {
    cards = item.items.map((it, i) => ({ id: 'c' + i, text: it.text, correctSlot: 's' + item.categories.indexOf(it.category) }));
    slots = item.categories.map((cat, i) => ({ id: 's' + i, label: cat, multi: true }));
    slotOrder = slots.map(s => s.id);
  }
  return { cards, slots, cardOrder: shuffle(cards.map(c => c.id)), slotOrder, type: item.type, slotIsCode: !!item.slotIsCode };
}
function renderDD_HTML(item, st) {
  if (!st.dd) st.dd = setupDD(item);
  currentDD = st.dd;
  const hints = {
    match: '🌿 Tap a card, then tap the slot next to its matching item. Tap a placed card to send it back.',
    order: '🌿 Tap a card, then tap the numbered slot for its position. Tap a placed card to send it back.',
    categorize: '🌿 Tap a card, then tap the category zone it belongs to. Tap a placed card to send it back.'
  };
  return `<div class="dd-hint">${hints[item.type]}</div><div id="ddArea"></div>`;
}
function attachDD(item, st) { renderDDArea(item, st); }
function renderDDArea(item, st) {
  currentDD = st.dd;
  const area = document.getElementById('ddArea');
  let h = '';
  const results = (st.answered || st.revealed) ? getDDResults(st) : null;
  if (currentDD.type === 'order') h += renderOrderSlots(st, results);
  else if (currentDD.type === 'match') h += renderMatchSlots(st, results);
  else h += renderCategorizeSlots(st, results);
  if (!st.answered && !st.revealed) {
    const inBank = currentDD.cardOrder.filter(cid => !st.placements[cid]);
    h += `<div class="card-bank"><div class="card-bank-label">Cards (${inBank.length} left)</div><div class="card-bank-cards">`;
    if (inBank.length === 0) h += `<div class="empty-hint">All placed — ready to check!</div>`;
    else inBank.forEach(cid => { const c = currentDD.cards.find(x => x.id === cid); const sel = st.selectedCard === cid ? ' selected' : ''; h += `<button class="dd-card${sel}" data-card="${cid}">${escapeHTML(c.text)}</button>`; });
    h += `</div></div>`;
  }
  area.innerHTML = h;
  if (st.answered || st.revealed) return;
  area.querySelectorAll('.dd-card').forEach(el => { el.onclick = (e) => { e.stopPropagation(); onCardClick(item, st, el.dataset.card); }; });
  area.querySelectorAll('[data-slot]').forEach(el => { el.onclick = () => onSlotClick(item, st, el.dataset.slot); });
}
function renderOrderSlots(st, results) {
  let h = '<div class="order-list">';
  currentDD.slotOrder.forEach(sid => { const slot = currentDD.slots.find(s => s.id === sid); h += `<div class="order-row"><div class="order-num">${slot.label}</div>${slotHTML(st, sid, results)}</div>`; });
  h += '</div>'; return h;
}
function renderMatchSlots(st, results) {
  let h = '<div class="match-list">';
  currentDD.slotOrder.forEach(sid => { const slot = currentDD.slots.find(s => s.id === sid); const labelHTML = currentDD.slotIsCode ? `<code>${escapeHTML(slot.label)}</code>` : escapeHTML(slot.label); h += `<div class="match-row"><div class="match-label">${labelHTML}</div>${slotHTML(st, sid, results)}</div>`; });
  h += '</div>'; return h;
}
function renderCategorizeSlots(st, results) {
  let h = '<div class="cat-zones">';
  currentDD.slotOrder.forEach(sid => {
    const slot = currentDD.slots.find(s => s.id === sid);
    const cardsHere = Object.keys(st.placements).filter(cid => st.placements[cid] === sid);
    h += `<div class="cat-zone" data-slot="${sid}"><div class="cat-zone-label">${escapeHTML(slot.label)}</div><div class="cat-zone-cards">`;
    if (cardsHere.length === 0) h += `<span class="placeholder">drop cards here</span>`;
    else cardsHere.forEach(cid => { const c = currentDD.cards.find(x => x.id === cid); let cls = 'dd-card'; if (results) cls += results[cid] ? ' correct' : ' wrong'; h += `<button class="${cls}" data-card="${cid}"${results ? ' disabled' : ''}>${escapeHTML(c.text)}</button>`; });
    h += `</div></div>`;
  });
  h += '</div>'; return h;
}
function slotHTML(st, sid, results) {
  const cardsHere = Object.keys(st.placements).filter(cid => st.placements[cid] === sid);
  if (cardsHere.length > 0) {
    const cid = cardsHere[0]; const c = currentDD.cards.find(x => x.id === cid);
    let cls = 'slot-target has-card', cardCls = 'dd-card', hint = '';
    if (results) { const ok = results[cid]; cls += ok ? ' correct' : ' wrong'; cardCls += ok ? ' correct' : ' wrong'; if (!ok) { const correctCard = currentDD.cards.find(x => x.correctSlot === sid); if (correctCard) hint = `<div class="slot-hint">→ correct: ${escapeHTML(correctCard.text)}</div>`; } }
    return `<div style="flex:1;"><div class="${cls}" data-slot="${sid}"><button class="${cardCls}" data-card="${cid}"${results ? ' disabled' : ''}>${escapeHTML(c.text)}</button></div>${hint}</div>`;
  }
  if (results) {
    const correctCard = currentDD.cards.find(x => x.correctSlot === sid);
    const hint = correctCard ? `<div class="slot-hint">→ correct: ${escapeHTML(correctCard.text)}</div>` : '';
    return `<div style="flex:1;"><div class="slot-target wrong" data-slot="${sid}"><span class="placeholder" style="color:var(--bad);">empty</span></div>${hint}</div>`;
  }
  return `<div class="slot-target" data-slot="${sid}"><span class="placeholder">tap to place</span></div>`;
}
function onCardClick(item, st, cardId) {
  if (st.answered || st.revealed) return;
  if (st.placements[cardId]) { delete st.placements[cardId]; st.selectedCard = null; }
  else { st.selectedCard = (st.selectedCard === cardId) ? null : cardId; }
  renderQuestion();
}
function onSlotClick(item, st, slotId) {
  if (st.answered || st.revealed || !st.selectedCard) return;
  const slot = st.dd.slots.find(s => s.id === slotId);
  if (!slot.multi) Object.keys(st.placements).forEach(cid => { if (st.placements[cid] === slotId) delete st.placements[cid]; });
  st.placements[st.selectedCard] = slotId; st.selectedCard = null; renderQuestion();
}
function getDDResults(st) { const results = {}; st.dd.cards.forEach(c => { results[c.id] = st.placements[c.id] === c.correctSlot; }); return results; }
function allDDPlaced(st) { return st.dd.cards.every(c => st.placements[c.id]); }
function checkDD(item, st) {
  if (st.answered || st.revealed || !allDDPlaced(st)) return;
  const results = getDDResults(st); const correctCount = Object.values(results).filter(Boolean).length; const total = st.dd.cards.length; const allCorrect = correctCount === total;
  st.answered = true; st.correct = allCorrect;
  if (allCorrect) markCorrect(st); else logWrongOnce(item, `${correctCount}/${total} placements correct`);
  renderQuestion();
}
function revealAnswer(item, st) {
  unscoreIfNeeded(st); st.answered = true; st.revealed = true; st.correct = false;
  if (item.type === 'mc') st.selectedChoiceOrig = null;
  else { st.placements = {}; st.dd.cards.forEach(c => { st.placements[c.id] = c.correctSlot; }); }
  renderQuestion();
}
function resetQuestion(item, st) {
  unscoreIfNeeded(st);
  st.selectedCard = null; st.placements = {}; st.answered = false; st.revealed = false; st.correct = false; st.selectedChoiceOrig = null;
  renderQuestion();
}
function renderActions(item, st) {
  const acts = document.getElementById('acts'); if (!acts) return;
  const isLast = pos + 1 === order.length; const prevDisabled = pos === 0 ? ' disabled' : ''; const nextText = isLast ? 'See results →' : 'Next question →';
  const ddReady = item.type !== 'mc' && st.dd && allDDPlaced(st) && !st.answered && !st.revealed;
  acts.style.display = 'flex';
  acts.innerHTML = `
    <button class="btn ghost" id="prevBtn"${prevDisabled}>← Previous</button>
    <button class="btn ghost" id="showBtn">Show answer</button>
    <button class="btn ghost" id="resetQBtn">Reset question</button>
    ${item.type !== 'mc' ? `<button class="btn" id="checkBtn"${ddReady ? '' : ' disabled'}>Check answers ✓</button>` : ''}
    <span class="spacer"></span>
    <button class="btn" id="nextBtn">${nextText}</button>`;
  document.getElementById('prevBtn').onclick = () => { if (pos > 0) { pos--; renderQuestion(); } };
  document.getElementById('showBtn').onclick = () => revealAnswer(item, st);
  document.getElementById('resetQBtn').onclick = () => resetQuestion(item, st);
  const checkBtn = document.getElementById('checkBtn'); if (checkBtn) checkBtn.onclick = () => checkDD(item, st);
  document.getElementById('nextBtn').onclick = () => { pos++; renderQuestion(); };
}

function renderResult() {
  elProg.style.width = '100%'; renderQuestionMap();
  const total = order.length; const pct = Math.round(score / total * 100);
  if (!resultCounted) { const completed = parseInt(lsGet(STORAGE_PREFIX + 'completed') || '0', 10) + 1; lsSet(STORAGE_PREFIX + 'completed', String(completed)); elCompleted.textContent = String(completed); resultCounted = true; }
  const bestRaw = lsGet(STORAGE_PREFIX + 'best'); const bestNum = bestRaw ? parseInt(bestRaw, 10) : 0;
  if (score > bestNum) { lsSet(STORAGE_PREFIX + 'best', String(score)); elBest.textContent = String(score); }
  let badge = '', cls = '';
  if (pct === 100) { badge = '🌸 Perfect — content fully absorbed'; cls = 'gold'; }
  else if (pct >= 90) { badge = '🌿 Excellent — almost everything stuck'; cls = 'gold'; }
  else if (pct >= 75) { badge = '☕ Solid — review misses, run another round'; cls = 'silver'; }
  else if (pct >= 50) { badge = '📖 Getting there — try one more pass'; cls = 'bronze'; }
  else { badge = '🍵 Warm-up done — replay to lock it in'; cls = 'try'; }
  const reviewHTML = wrongLog.length === 0 ? `<div class="review-list" style="border:0;"><h3>No mistakes this round 🌸</h3></div>` : `<div class="review-list"><h3>Review — ${wrongLog.length} to revisit</h3>${wrongLog.map(w => `<div class="review-item"><div class="qq">${escapeHTML(w.q)}</div><div class="info">${escapeHTML(w.info)}</div></div>`).join('')}</div>`;
  elCard.innerHTML = `<div class="result"><h2>Round ${round} complete</h2><div class="badge ${cls}">${badge}</div><div class="score-big">${score} / ${total}</div><div class="score-pct">${pct}% correct</div><div class="score-pct">Completed full rounds saved in this browser: ${lsGet(STORAGE_PREFIX + 'completed') || '0'}</div>${reviewHTML}<div class="actions" style="justify-content:center;"><button class="btn" id="againBtn">Play another round ↻</button><button class="btn ghost" id="resetBestBtn">Reset best score</button><button class="btn ghost" id="resetCountBtn">Reset completed count</button></div></div>`;
  document.getElementById('againBtn').onclick = () => { round++; startRound(); };
  document.getElementById('resetBestBtn').onclick = () => { lsDel(STORAGE_PREFIX + 'best'); elBest.textContent = '—'; const b = document.getElementById('resetBestBtn'); b.textContent = 'Best score reset ✓'; b.disabled = true; };
  document.getElementById('resetCountBtn').onclick = () => { lsDel(STORAGE_PREFIX + 'completed'); elCompleted.textContent = '0'; const b = document.getElementById('resetCountBtn'); b.textContent = 'Completed count reset ✓'; b.disabled = true; };
}

startRound();
</script>
</body>
</html>
